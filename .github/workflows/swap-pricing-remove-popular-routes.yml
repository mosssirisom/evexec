name: Swap pricing and remove popular routes

on:
  push:
    paths:
      - .github/workflows/swap-pricing-remove-popular-routes.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-html:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Add robust runtime pricing swap without redesigning
        run: |
          python <<'PY'
          from pathlib import Path

          marker_start = '<!-- EVEXEC_PRICING_SWAP_FIX_START -->'
          marker_end = '<!-- EVEXEC_PRICING_SWAP_FIX_END -->'

          script = r'''<!-- EVEXEC_PRICING_SWAP_FIX_START -->
<script>
(function(){
  function textOf(el){ return (el && el.textContent || '').replace(/\s+/g,' ').trim().toLowerCase(); }
  function closestSection(el){
    return el && (el.closest('section') || el.closest('[class*="section"]') || el.closest('main > div') || el.parentElement);
  }
  function findHeadingContaining(phrases){
    var nodes = Array.from(document.querySelectorAll('h1,h2,h3,h4,p,span,div'));
    return nodes.find(function(el){
      var t = textOf(el);
      if (!t || t.length > 220) return false;
      return phrases.some(function(p){ return t.indexOf(p) !== -1; });
    });
  }
  function run(){
    var popularHeading = findHeadingContaining(['popular airport routes']);
    var pricingHeading = findHeadingContaining(['transparent fixed pricing','transparent pricing','full airport price list']);
    var popularSection = closestSection(popularHeading);
    var pricingSection = closestSection(pricingHeading);

    if (popularSection && pricingSection && popularSection !== pricingSection) {
      popularSection.parentNode.insertBefore(pricingSection, popularSection);
      popularSection.remove();
    } else if (popularSection && !pricingSection) {
      popularSection.remove();
    }

    Array.from(document.querySelectorAll('a')).forEach(function(a){
      var t = textOf(a);
      var href = (a.getAttribute('href') || '').toLowerCase();
      if (t.indexOf('popular airport routes') !== -1 || href.indexOf('popular-routes') !== -1) {
        a.remove();
      }
    });
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', run);
  else run();
})();
</script>
<!-- EVEXEC_PRICING_SWAP_FIX_END -->'''

          changed = False
          for path in [Path('index.html'), Path('Index.html')]:
              if not path.exists():
                  continue
              html = path.read_text(encoding='utf-8', errors='ignore')
              original = html

              while marker_start in html and marker_end in html:
                  s = html.find(marker_start)
                  e = html.find(marker_end, s) + len(marker_end)
                  html = html[:s] + html[e:]

              if '</body>' in html:
                  html = html.replace('</body>', script + '\n</body>', 1)
              else:
                  html += '\n' + script + '\n'

              if html != original:
                  path.write_text(html, encoding='utf-8')
                  changed = True
                  print('Patched', path)

          if not changed:
              raise SystemExit('No index.html or Index.html file found to patch')
          PY

      - name: Commit result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Swap transparent pricing and remove popular airport routes"
          git push
