name: Fix airport route image references

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-airport-images:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Patch airport card image paths only
        run: |
          python <<'PY'
          from pathlib import Path
          import re

          route_images = {
              'Manchester Airport': ('./Manchester Airport.png', 'Manchester Airport EV Exec Tesla transfer'),
              'Liverpool Airport': ('./Liverpool Airport.png', 'Liverpool Airport EV Exec Tesla transfer'),
              'Leeds Bradford Airport': ('./Leeds Bradford Airport.png', 'Leeds Bradford Airport EV Exec Tesla transfer'),
              'Birmingham Airport': ('./Birmingham Airport.png', 'Birmingham Airport EV Exec Tesla transfer'),
              'Newcastle Airport': ('./Newcastle Airport.png', 'Newcastle Airport EV Exec Tesla transfer'),
          }

          def patch_by_title(html, title, src, alt):
              pos = html.find(title)
              if pos == -1:
                  return html
              start = max(0, pos - 3000)
              chunk = html[start:pos]
              imgs = list(re.finditer(r'<img\b[^>]*>', chunk, flags=re.I|re.S))
              if not imgs:
                  return html
              m = imgs[-1]
              abs_start = start + m.start()
              abs_end = start + m.end()
              tag = html[abs_start:abs_end]
              tag = re.sub(r'\bsrc\s*=\s*(["\']).*?\1', f'src="{src}"', tag, count=1, flags=re.I|re.S)
              if re.search(r'\balt\s*=', tag, flags=re.I):
                  tag = re.sub(r'\balt\s*=\s*(["\']).*?\1', f'alt="{alt}"', tag, count=1, flags=re.I|re.S)
              else:
                  tag = tag[:-1] + f' alt="{alt}">'
              return html[:abs_start] + tag + html[abs_end:]

          touched = False
          for path in [Path('index.html'), Path('Index.html')]:
              if not path.exists():
                  continue
              html = path.read_text(encoding='utf-8', errors='ignore')
              original = html

              html = html.replace('assets/images/manchester-airport.jpg', './Manchester Airport.png')
              html = html.replace('assets/images/liverpool-airport.jpg', './Liverpool Airport.png')
              html = html.replace('assets/images/leeds-bradford-airport.jpg', './Leeds Bradford Airport.png')
              html = html.replace('assets/images/birmingham-airport.jpg', './Birmingham Airport.png')
              html = html.replace('assets/images/newcastle-airport.jpg', './Newcastle Airport.png')

              for title, vals in route_images.items():
                  html = patch_by_title(html, title, vals[0], vals[1])

              if html != original:
                  path.write_text(html, encoding='utf-8')
                  touched = True
                  print(f'Patched {path}')

          if not touched:
              raise SystemExit('No changes detected')
          PY

      - name: Commit fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html Index.html || true
          git commit -m "Fix airport route image references" || exit 1
          git push
