name: Fix airport route image references

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/fix-airport-images.yml

permissions:
  contents: write

jobs:
  fix-airport-images:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Patch only airport route image paths
        run: |
          python <<'PY'
          from pathlib import Path

          files = [Path('index.html'), Path('Index.html')]

          replacements = {
              'EV Exec Website Pics/Manchester Airport.png': './Manchester Airport.png',
              'EV Exec Website Pics/Liverpool Airport.png': './Liverpool Airport.png',
              'EV Exec Website Pics/Leeds Bradford Airport.png': './Leeds Bradford Airport.png',
              'EV Exec Website Pics/Birmingham Airport.png': './Birmingham Airport.png',
              'EV Exec Website Pics/Newcastle Airport.png': './Newcastle Airport.png',
              'assets/images/manchester-airport.jpg': './Manchester Airport.png',
              'assets/images/liverpool-airport.jpg': './Liverpool Airport.png',
              'assets/images/leeds-bradford-airport.jpg': './Leeds Bradford Airport.png',
              'assets/images/birmingham-airport.jpg': './Birmingham Airport.png',
              'assets/images/newcastle-airport.jpg': './Newcastle Airport.png',
              'assets/images/manchester-airport.png': './Manchester Airport.png',
              'assets/images/liverpool-airport.png': './Liverpool Airport.png',
              'assets/images/leeds-bradford-airport.png': './Leeds Bradford Airport.png',
              'assets/images/birmingham-airport.png': './Birmingham Airport.png',
              'assets/images/newcastle-airport.png': './Newcastle Airport.png',
          }

          alt_replacements = {
              'src="./Manchester Airport.png" alt="Manchester Airport"': 'src="./Manchester Airport.png" alt="Manchester Airport EV Exec Tesla transfer"',
              'src="./Liverpool Airport.png" alt="Liverpool Airport"': 'src="./Liverpool Airport.png" alt="Liverpool Airport EV Exec Tesla transfer"',
              'src="./Leeds Bradford Airport.png" alt="Leeds Bradford Airport"': 'src="./Leeds Bradford Airport.png" alt="Leeds Bradford Airport EV Exec Tesla transfer"',
              'src="./Birmingham Airport.png" alt="Birmingham Airport"': 'src="./Birmingham Airport.png" alt="Birmingham Airport EV Exec Tesla transfer"',
              'src="./Newcastle Airport.png" alt="Newcastle Airport"': 'src="./Newcastle Airport.png" alt="Newcastle Airport EV Exec Tesla transfer"',
          }

          touched = False
          for file_path in files:
              if not file_path.exists():
                  continue

              html = file_path.read_text(encoding='utf-8', errors='ignore')
              original = html

              for old, new in replacements.items():
                  html = html.replace(old, new)

              for old, new in alt_replacements.items():
                  html = html.replace(old, new)

              if html != original:
                  file_path.write_text(html, encoding='utf-8')
                  touched = True
                  print(f'Patched {file_path}')
              else:
                  print(f'No airport image reference changes needed in {file_path}')

          if not touched:
              print('No changes were required.')
          PY

      - name: Commit airport image path fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html Index.html || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Fix airport route image references"
            git push
          fi
