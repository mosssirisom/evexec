<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>EV Exec</title><script src="https://cdn.tailwindcss.com"></script></head><body style="background:#020813;color:white;font-family:Arial,sans-serif"><main style="max-width:900px;margin:auto;padding:40px"><h1 style="font-size:48px;font-weight:700">EV Exec</h1><p>Premium airport transfers.</p><form id="quote-form"><input name="customer_name" placeholder="Name" required><input name="phone" placeholder="Phone" required><button type="submit">Submit</button></form><script>document.getElementById('quote-form').addEventListener('submit',async(e)=>{e.preventDefault();const data=Object.fromEntries(new FormData(e.target).entries());await fetch('/api/quote-request',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});alert('Submitted')})</script></main></body></html>
